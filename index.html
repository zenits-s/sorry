<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yar sorry.. please maaf kar do..Anshika jii</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 400px;
      margin: auto;
    }

    h1 {
      font-size: 24px;
      color: #333;
    }

    img {
      width: 100%;
      max-width: 250px;
      border-radius: 15px;
      margin: 20px 0;
    }

    /* MOBILE BUTTON LAYOUT */
    .buttons {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 30px;
      padding: 0 10px;
    }

    button {
      padding: 12px 18px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.3s ease;
      min-width: 100px;
    }

    #yesBtn {
      background-color: #28a745;
      color: white;
      transform-origin: center;
    }

    #noBtn {
      background-color: #dc3545;
      color: white;
    }

    #message {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Yar sorry.. please maaf kar do..Anshika jii</h1>

    <img src="https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif" alt="Cute Cat">

    <div class="buttons">
      <button id="yesBtn">Yes 💖</button>
      <button id="noBtn">No 😢</button>
    </div>

    <div id="message"></div>
  </div>

  <script>
    let yesSize = 1;
    let clickCount = 0;

    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const message = document.getElementById("message");

    yesBtn.addEventListener("click", () => {
      window.location.href = "yes.html";
    });

    noBtn.addEventListener("click", () => {
      clickCount++;

      // controlled slow growth (safe for ~10 clicks)
      if (yesSize < 2.5) {
        yesSize += 0.15;
        yesBtn.style.transform = `scale(${yesSize})`;
      }

      message.innerHTML = "Please maan jao na 😭";
    });
  </script>

</body>
</html>
